server:
  port: 8081

spring:
  application:
    name: event-ingest
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/local-public.pem
  kafka:
    bootstrap-servers:
      - localhost:9092
    # Security: override KAFKA_SECURITY_PROTOCOL=SASL_SSL and KAFKA_SASL_JAAS_CONFIG in Helm for production
    security:
      protocol: SSL
    properties:
      sasl.mechanism: SCRAM-SHA-512
      sasl.jaas.config: ${KAFKA_SASL_JAAS_CONFIG:}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    consumer:
      group-id: event-ingest-group
      client-id: local
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 5000
      properties:
        group-instance-id: Local
        session.timeout.ms: 300000
        max.poll.interval: 10m
        heartbeat.interval: 60s
        fetch.max.bytes: 52428800
        fetch.min.size: 16MB
        fetch.max.wait: 50
        partition.assignment.strategy: org.apache.kafka.clients.consumer.CooperativeStickyAssignor
        allow.auto.create.topics: false
    admin:
      security:
        protocol: SSL
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
      ack-mode: manual

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      consume:
        - w3c
        - b3
      produce:
        - w3c

logging:
  level:
    root: error
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level %magenta([${spring.application.name},%X{traceId:-},%X{spanId:-}]) %cyan(%logger{36}) - %msg%n"

leader-election:
  lock-name: leader:event-ingest
  retry-interval-ms: 2000
  lock-watchdog-timeout-ms: 30000
  clustered: true
  host: redis://localhost:6379
  password: placeholder

s3:
  bucket: ${S3_BUCKET:event-viewer-local}
  region: ${S3_REGION:us-east-1}
  prefix: events
  endpoint-override: ${S3_ENDPOINT_OVERRIDE:http://localhost:4566}
  connection-pool-size: 50
  request-timeout-ms: 5000
  max-retries: 3

opensearch:
  host: localhost
  port: 9200
  index:
    replicas: 0

event-ingest:
  kafka:
    topics:
      - name: event-raw-1
        partitions: 2
        replication-factor: 1
      - name: event-raw-2
        partitions: 2
        replication-factor: 1
      - name: event-raw-3
        partitions: 2
        replication-factor: 1
      - name: event-raw-4
        partitions: 2
        replication-factor: 1
    dead-letter-topics:
      - name: event-raw-1.DLT
        partitions: 2
        replication-factor: 1
      - name: event-raw-2.DLT
        partitions: 2
        replication-factor: 1
      - name: event-raw-3.DLT
        partitions: 2
        replication-factor: 1
      - name: event-raw-4.DLT
        partitions: 2
        replication-factor: 1
    lag-monitor:
      enabled: true
      interval-ms: 60000
      consumer-group-ids:
        - event-ingest-group
        - event-ingest-dlt-group
  consumer:
    # Override MY_POD_NAME and INGEST_POD_COUNT from Helm chart in production
    pod-name: local-pod
    pod-count: 1
