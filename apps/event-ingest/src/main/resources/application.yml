server:
  port: 8081

spring:
  application:
    name: event-ingest
  threads:
    virtual:
      enabled: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/local-public.pem
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
    admin:
      fail-fast: false
    template:
      observation-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health, metrics, prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    enabled: true
    sampling:
      probability: 1.0
    propagation:
      consume:
        - w3c
        - b3
      produce:
        - w3c

logging:
  level:
    root: error
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level %magenta([${spring.application.name},%X{traceId:-},%X{spanId:-}]) %cyan(%logger{36}) - %msg%n"

leader-election:
  lock-name: leader:event-ingest
  retry-interval-ms: 2000
  lock-watchdog-timeout-ms: 30000
  clustered: true
  host: redis://localhost:6379
  password: placeholder

event-ingest:
  kafka:
    topics:
      - name: event-raw
        partitions: 3
        replication-factor: 1
        dead-letter:
          name: event-raw-dlt
          partitions: 1
          replication-factor: 1
    lag-monitor:
      enabled: true
      interval-ms: 60000
      consumer-group-ids:
        - event-ingest-group
