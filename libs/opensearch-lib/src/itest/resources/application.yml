spring:
  application:
    name: opensearch-lib-itest
  main:
    allow-bean-definition-overriding: true

opensearch:
  host: localhost
  port: 9200
  use-ssl: false
  bulk:
    flush-threshold: 10
    flush-interval-ms: 500
  migration:
    index-name: it-test-migrations

leader-election:
  lock-name: leader:os-schema-manager-itest
  retry-interval-ms: 300
  lock-watchdog-timeout-ms: 10000
  clustered: false
  host: redis://localhost:6379

management:
  tracing:
    enabled: false
  endpoints:
    web:
      exposure:
        include: health, metrics

logging:
  level:
    root: error
    org.eventviewer: warn
