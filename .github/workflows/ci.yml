name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Backend: compile all modules + run tests ───────────────────────────────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build and test
        run: ./gradlew build

  # ── Frontend: type-check + build ──────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── Smoke test: infra healthy + gateway responds ───────────────────────────
  smoke-test:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Start infrastructure
        # docker-compose.yml ships safe defaults for all env vars — no env file needed in CI.
        run: docker compose up -d

      - name: Wait for all infrastructure services to be healthy
        timeout-minutes: 2
        run: |
          services=(kafka postgres opensearch localstack)
          for svc in "${services[@]}"; do
            echo "Waiting for $svc..."
            for i in $(seq 1 24); do
              health=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q $svc)" 2>/dev/null || echo "unknown")
              if [ "$health" = "healthy" ]; then
                echo "  $svc is healthy"
                break
              fi
              if [ "$i" -eq 24 ]; then
                echo "  $svc did not become healthy in time"
                docker compose logs $svc
                exit 1
              fi
              sleep 5
            done
          done

      - name: Start Gateway in background
        run: ./gradlew :apps:gateway:bootRun &

      - name: Wait for Gateway health endpoint
        timeout-minutes: 2
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Gateway is healthy"
              curl -s http://localhost:8080/actuator/health
              exit 0
            fi
            echo "Waiting for gateway... ($i/30)"
            sleep 4
          done
          echo "Gateway failed to start"
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v
